<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>童慧行 亲子学习旅行平台</title>
  <meta name="description" content="童慧行亲子学习旅行平台，涵盖国学启蒙、诗词学习、通识百科、英语学习、亲子旅行等内容" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1F31F;</text></svg>" />
  <script>
    // 废弃 PWA Service Worker 注销脚本（页面加载即删除旧 PWA 缓存）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        for (var i = 0; i < regs.length; i++) {
          regs[i].unregister();
        }
      });
      if (caches) {
        caches.keys().then(function(names) {
          for (var i = 0; i < names.length; i++) {
            caches.delete(names[i]);
          }
        });
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
